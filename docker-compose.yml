services:
  slacksmith:
    build: .
    env_file: .env
    volumes:
      - ./agents:/app/agents
      - ./mcp.config.json:/app/mcp.config.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
